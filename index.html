<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>纯前端视频解压器</title>
    <script src="https://unpkg.com/@zip.js/zip.js/dist/zip.min.js"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; background-color: #0b0f19; color: #e2e8f0; display: flex; justify-content: center; padding: 20px; margin: 0; box-sizing: border-box; }
        .container { background-color: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; width: 100%; max-width: 400px; text-align: center; margin-top: 20px; }
        h2 { color: #f8fafc; margin-top: 0; font-size: 20px; }
        .drop-zone { border: 2px dashed #334155; border-radius: 12px; padding: 40px 15px; margin: 20px 0; background-color: #111827; cursor: pointer; transition: all 0.3s; }
        /* 添加一个拖拽悬浮时的样式类 */
        .drop-zone.dragover { border-color: #38bdf8; background-color: #1e3a8a; }
        .drop-zone:active { border-color: #38bdf8; background-color: #1e3a8a; }
        .title { color: #38bdf8; font-weight: bold; font-size: 16px; margin-bottom: 8px;}
        .sub { color: #64748b; font-size: 12px; }
        input[type="file"] { display: none; }
        button { background-color: #3b82f6; color: white; border: none; border-radius: 6px; padding: 12px 20px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:disabled { background-color: #475569; color: #94a3b8; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 14px; font-weight: bold; min-height: 20px; word-break: break-all; }
        #progressContainer { width: 100%; background-color: #0f172a; border-radius: 4px; margin-top: 15px; display: none; border: 1px solid #334155; overflow: hidden; }
        #progressBar { height: 10px; background-color: #10b981; width: 0%; transition: width 0.2s; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔑 本地全自动解压器</h2>
    
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="title">📦 点击或拖拽 .xls 伪装包至此</div>
        <div class="sub">无需联网，纯本地解析，自动嗅探密码</div>
        <div id="fileNameDisplay" style="margin-top: 10px; font-size: 13px; color: #cbd5e1;"></div>
    </div>
    
    <input type="file" id="fileInput" accept=".xls,.zip">
    
    <button id="extractBtn" disabled onclick="startExtraction()">开始解压并保存</button>
    
    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>
    <div id="status">等待选择文件...</div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const extractBtn = document.getElementById('extractBtn');
    const statusDiv = document.getElementById('status');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');

    // --- 新增：拖拽事件监听 ---
    
    // 拖拽进入区域
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault(); // 必须阻止默认行为，否则无法触发 drop
        dropZone.classList.add('dragover');
    });

    // 拖拽离开区域
    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
    });

    // 松开鼠标丢下文件
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
            // 将拖拽获取到的文件赋值给隐藏的 fileInput
            fileInput.files = e.dataTransfer.files;
            // 手动触发处理逻辑
            handleFileSelect();
        }
    });

    // --- 原有逻辑整合 ---

    // 监听点击选择文件
    fileInput.addEventListener('change', handleFileSelect);

    // 统一处理文件被选择后的 UI 状态
    function handleFileSelect() {
        if (fileInput.files.length > 0) {
            fileNameDisplay.textContent = `已选择: ${fileInput.files[0].name}`;
            extractBtn.disabled = false;
            statusDiv.textContent = "准备就绪";
            statusDiv.style.color = "#e2e8f0";
            progressContainer.style.display = "none";
            progressBar.style.width = "0%";
        } else {
            fileNameDisplay.textContent = '';
            extractBtn.disabled = true;
            statusDiv.textContent = "等待选择文件...";
        }
    }

    function updateStatus(msg, color = "#38bdf8") {
        statusDiv.textContent = msg;
        statusDiv.style.color = color;
    }

    async function startExtraction() {
        if (fileInput.files.length === 0) return;
        
        const file = fileInput.files[0];
        extractBtn.disabled = true;
        progressContainer.style.display = "block";
        progressBar.style.width = "0%";

        try {
            // 1. 自动嗅探密码
            const pwdMatch = file.name.match(/(xxbl\d{8})/);
            if (!pwdMatch) {
                throw new Error("文件名未包含密码结构 (如 xxbl20260315)");
            }
            const currentPwd = pwdMatch[1];
            updateStatus(`已嗅探到密码: ${currentPwd}，正在读取...`);

            // 2. 初始化 ZIP 读取器 (传入密码)
            const zipReader = new zip.ZipReader(new zip.BlobReader(file), { password: currentPwd });
            const entries = await zipReader.getEntries();

            if (!entries || entries.length === 0) {
                throw new Error("压缩包为空或无法读取");
            }

            // 取压缩包里的第一个文件
            const targetEntry = entries[0];
            updateStatus(`正在解压: ${targetEntry.filename}...`);

            // 3. 执行解密和提取，并监听进度
            const blob = await targetEntry.getData(
                new zip.BlobWriter(),
                {
                    onprogress: (index, max) => {
                        const percent = Math.round((index / max) * 100);
                        progressBar.style.width = `${percent}%`;
                        if (percent % 10 === 0 || percent === 100) {
                            updateStatus(`解压进度: ${percent}%`);
                        }
                    }
                }
            );

            // 4. 触发下载
            updateStatus("🎉 解压完成！正在调起下载...", "#10b981");
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = downloadUrl;
            a.download = targetEntry.filename;
            document.body.appendChild(a);
            a.click();
            
            // 延时清理释放内存
            setTimeout(() => {
                window.URL.revokeObjectURL(downloadUrl);
                document.body.removeChild(a);
                zipReader.close();
            }, 1000);

        } catch (error) {
            console.error(error);
            let errorMsg = error.message;
            if (errorMsg.includes("Invalid password") || errorMsg.includes("password")) {
                errorMsg = "密码错误或不支持的加密格式";
            }
            updateStatus(`⚠️ 错误: ${errorMsg}`, "#ef4444");
            progressBar.style.backgroundColor = "#ef4444";
        } finally {
            extractBtn.disabled = false;
        }
    }
</script>
</body>
</html>
